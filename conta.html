<!DOCTYPE html>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<header class="site-header">
  <div class="container nav">
    <a href="index.html" class="brand"><span class="brand-mark">TN</span><span>Tech<b>Nova</b></span></a>
    <button class="menu-toggle" aria-label="Abrir menu">☰</button>
    <nav class="nav-links">
      <a href="index.html">Início</a>
      <a href="catalogo.html">Produtos</a>
      <a href="servicos.html">Serviços</a>
      <a href="locacao.html">Locação</a>
      <a href="conta.html">Minha conta</a>
    </nav>
    <div class="nav-actions">

      <button class="icon-btn" onclick="logoutUser()">Sair</button>
    </div>
  </div>
</header>
<main class="container">

    <h1 id="userGreeting">Olá</h1>
    <p id="userEmail" style="color:var(--muted)"></p>
  </section>
  <div class="tabs" role="tablist">
    <button class="tab active" data-tab="tab-orders">📦 Meus pedidos</button>

  </div>
  <div id="tab-orders" class="tab-panel active"><div id="ordersTable"></div></div>
  <div id="tab-services" class="tab-panel"><div id="servicesTable"></div></div>
  <div id="tab-profile" class="tab-panel">
    <form id="profileForm" style="max-width:480px">
      <div class="field"><label>Nome</label><input type="text" name="name" required/></div>
      <div class="field"><label>E-mail</label><input type="email" name="email" disabled/></div>
      <button class="btn btn-primary" type="submit">Salvar alterações</button>
    </form>
  </div>
</main>
<footer class="site-footer"><div class="container footer-bottom">© 2026 TechNova</div></footer>
